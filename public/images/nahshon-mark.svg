<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="NAHSHON MEP">
  <!-- Isometric cube mark (NAHSHON MEP brand red). Swap this file with the official logo to update it everywhere. -->
  <g stroke="#1E212B" stroke-width="1.1" stroke-linejoin="round">
    <!-- top face -->
    <polygon points="50,8 88,29 50,50 12,29" fill="#E5403E"/>
    <!-- left face -->
    <polygon points="12,29 50,50 50,92 12,71" fill="#A81E22"/>
    <!-- right face -->
    <polygon points="88,29 50,50 50,92 88,71" fill="#7C1518"/>
  </g>
  <!-- subtle face subdivisions to echo the cube-cluster mark -->
  <g stroke="#ffffff" stroke-opacity="0.16" stroke-width="0.9">
    <line x1="31" y1="18.5" x2="69" y2="39.5"/>
    <line x1="31" y1="39.5" x2="69" y2="18.5"/>
    <line x1="31" y1="39.5" x2="31" y2="81.5"/>
    <line x1="69" y1="39.5" x2="69" y2="81.5"/>
  </g>
</svg>
