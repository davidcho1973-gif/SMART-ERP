<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="NAHSHON MEP">
  <!-- Isometric cube-cluster mark in NAHSHON MEP brand red. This is a recreation;
       replace this file with the official logo to update it everywhere. -->
  <g stroke="#1E212B" stroke-width="0.7" stroke-linejoin="round">
    <!-- top face (2x2), light reds -->
    <polygon points="50,8 68,18.5 50,29 32,18.5" fill="#EE5551"/>
    <polygon points="68,18.5 86,29 68,39.5 50,29" fill="#E5403E"/>
    <polygon points="50,29 68,39.5 50,50 32,39.5" fill="#D63A38"/>
    <polygon points="32,18.5 50,29 32,39.5 14,29" fill="#E5403E"/>
    <!-- left face (2x2), mid reds -->
    <polygon points="14,29 32,39.5 32,60.5 14,50" fill="#A81E22"/>
    <polygon points="32,39.5 50,50 50,71 32,60.5" fill="#B22327"/>
    <polygon points="32,60.5 50,71 50,92 32,81.5" fill="#951A1E"/>
    <polygon points="14,50 32,60.5 32,81.5 14,71" fill="#A81E22"/>
    <!-- right face (2x2), dark reds -->
    <polygon points="86,29 68,39.5 68,60.5 86,50" fill="#7C1518"/>
    <polygon points="68,39.5 50,50 50,71 68,60.5" fill="#86171A"/>
    <polygon points="68,60.5 50,71 50,92 68,81.5" fill="#6E1114"/>
    <polygon points="86,50 68,60.5 68,81.5 86,71" fill="#7C1518"/>
  </g>
</svg>
